spring.application.name=product-service
server.port=8081

# ================= DATABASE =================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=productdb;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=masthan1234@
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ================= KAFKA =================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=product-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# VERY IMPORTANT
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=product_service.product_service.dto.CartEvent
spring.kafka.consumer.properties.spring.json.value.default.type=product_service.product_service.dto.CartEvent